<div class="min-h-screen flex items-center justify-center p-4">
  <div class="flex flex-col md:flex-row bg-white shadow-xl rounded-xl overflow-hidden w-full max-w-6xl">

    <!-- ================= IMAGE SECTION ================= -->
    <div class="w-full md:w-2/5 bg-gradient-to-br from-orange-300 to-orange-400 flex items-center justify-center p-6 md:p-8">
      <div class="w-full max-w-xs text-center">
        <div class="relative w-full overflow-hidden rounded-xl bg-opacity-20 p-3 shadow-lg">
          <div
            #sliderRef
            class="slider flex transition-transform duration-1000 ease-in-out"
            [style.transform]="'translateX(-' + currentIndex * 100 + '%)'"
            [style.transition]="isTransitionEnabled ? 'transform 1s ease-in-out' : 'none'">

            <img
              *ngFor="let img of imageList"
              [src]="img"
              alt="Admin"
              class="w-56 h-56 object-contain flex-shrink-0 mx-auto rounded-lg" />

            <img
              [src]="imageList[0]"
              alt="Clone"
              class="w-56 h-56 object-contain flex-shrink-0 mx-auto rounded-lg" />
          </div>
        </div>

        <div class="mt-6 text-white">
          <h3 class="text-xl font-bold">Welcome Super Admin!</h3>
          <p class="mt-2 text-sm opacity-90">Sign in to access super admin dashboard</p>
        </div>

        <div class="flex justify-center mt-4 space-x-2">
          <div *ngFor="let img of imageList; let i = index"
               class="w-2 h-2 rounded-full bg-white transition-all duration-300"
               [class]="{'opacity-100': currentIndex === i, 'opacity-40': currentIndex !== i}">
          </div>
        </div>
      </div>
    </div>

    <!-- ================= FORM SECTION ================= -->
    <div class="w-full md:w-3/5 p-6 sm:p-8 md:p-10 flex flex-col justify-center">

      <div class="text-center mb-6">
        <h2 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-2">
          Super Admin Login
        </h2>
        <p class="text-gray-600 text-sm">
          Manage the system with full control
        </p>
      </div>

      <form class="space-y-5" [formGroup]="loginForm" (ngSubmit)="onloginSubmit()">

        <!-- EMAIL -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Email Address
          </label>
          <input
            type="email"
            formControlName="usernameOrEmail"
            placeholder="Enter your email"
            class="form-control"
            [ngClass]="{
              'border-red-500': loginSubmitted && loginUser['usernameOrEmail'].invalid,
              'border-green-500': loginSubmitted && loginUser['usernameOrEmail'].valid
            }" />
        </div>

        <!-- PASSWORD -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Password
          </label>
          <div class="relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Enter your password"
              class="form-control"
              (input)="onPasswordInput()" />

            <div
              *ngIf="PasswordValue?.length"
              class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer"
              (click)="togglePasswordVisibility()">
              👁
            </div>
          </div>
        </div>

        <!-- SUBMIT -->
        <button
          type="submit"
          class="w-full custom-button hover:bg-orange-400 transition">
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>

<!-- ================= EMAIL OTP MODAL ================= -->
<div
  *ngIf="step === 'emailOtp'"
  class="fixed inset-0 flex items-center justify-center bg-black/30 backdrop-blur-sm z-50">

  <div class="bg-white p-6 rounded-xl w-full max-w-sm shadow-2xl mx-4 relative">

    <!-- CLOSE -->
    <button
      type="button"
      class="absolute top-3 right-3 text-red-600 font-bold text-xl"
      (click)="closeOtpModal()">
      ✕
    </button>

    <h2 class="text-2xl font-bold text-center mb-2">
      Email Verification
    </h2>

    <p class="text-sm text-gray-600 text-center mb-6">
      Enter the OTP sent to your email
    </p>

    <!-- OTP INPUT -->
    <div class="flex justify-center space-x-3 mb-6">
      <ng-container *ngFor="let i of [0,1,2,3,4,5]">
        <input
          type="text"
          maxlength="1"
          class="w-12 h-12 text-center text-lg border rounded-lg"
          (input)="handle2FAInput($event, i)"
          (keydown)="onOtpKeyDown($event, i)" />
      </ng-container>
    </div>

    <!-- VERIFY -->
    <button
      class="w-full custom-button"
      [disabled]="otpCode.length !== 6"
      (click)="verifyOtp()">
      Verify & Login
    </button>

    <!-- RESEND -->
    <div class="mt-4 text-center">
      <button
        type="button"
        class="text-sm text-orange-300 hover:text-orange-400"
        (click)="resendOtp()">
        Resend OTP
      </button>
    </div>

  </div>
</div>
