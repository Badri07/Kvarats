<div style="background-color: #F9F4F1;">

  <!-- Navbar -->
  <nav class="flex justify-between items-center px-8 py-3 shadow-sm" style="background-color: #FFFFFF;">
    <div class="flex items-center space-x-2">
      <!-- Logo -->
      <img [src]="logo" alt="CareSlot Logo" class="w-40">
    </div>

     <ul class="nav-menu">
        <li>
          <a
            routerLink="dashboard"
            routerLinkActive="active-menu"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Dashboard</span>
          </a>
        </li>
          <li>
          <a
            routerLink="file-upload"
            routerLinkActive="active-menu"
            class="nav-link">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" 
     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" 
     stroke-linecap="round" stroke-linejoin="round">
  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
  <polyline points="14 2 14 8 20 8"/>
  <line x1="16" y1="13" x2="8" y2="13"/>
  <line x1="16" y1="17" x2="8" y2="17"/>
</svg>

            <span>Patients File</span>
          </a>
        </li>
        <li>
          <a
            routerLink="patients-appointments"
            routerLinkActive="active-menu"
            class="nav-link">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>Consultation</span>
          </a>
        </li>

          <li>
          <a
            routerLink="notes"
            routerLinkActive="active-menu"
            class="nav-link">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>Notes</span>
          </a>
        </li>

        <li>
          <a
            routerLink="payment"
            routerLinkActive="active-menu"
            class="nav-link">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>Payments</span>
          </a>
        </li>
      </ul>

    <!-- User avatar with initials -->
    <div class="relative">
      <div
        class="flex items-center space-x-3 text-gray-800 cursor-pointer"
        (click)="toggleMenu($event)">
        <div class="w-8 h-8 rounded-full bg-orange-400 flex items-center justify-center text-white font-semibold text-xs">
          {{ getUserInitials() }}
        </div>
        <span class="text-sm">{{ userName }}</span>
      </div>

      <!-- Logout popup -->
      <div
        *ngIf="menuOpen"
        class="absolute right-0 mt-2 w-48 bg-white border rounded shadow-lg z-50"
        (click)="$event.stopPropagation()">
        <div class="p-2">
          <button 
            (click)="logout()"
            class="w-full text-left px-4 py-2 text-red-600 hover:bg-gray-100 rounded flex items-center space-x-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7" />
            </svg>
            <span>Logout</span>
          </button>
        </div>
      </div>
    </div>

  </nav>

  <div class="patients-workspace">
    <router-outlet></router-outlet>
  </div>

</div>
