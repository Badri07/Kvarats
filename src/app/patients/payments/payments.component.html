      <div class="payments-container space-y-4">
  <div class="grid grid-cols-8 gap-2 font-semibold bg-gray-100 px-4 py-2 rounded-lg shadow-sm">
    <div>Invoice ID</div>
    <div>Date</div>
    <div>Services</div>
    <div>Total</div>
    <div>Discount</div>
    <div>Final</div>
    <div>Status</div>
    <div>Actions</div>
  </div>

  <div *ngIf="paginatedPayments.length; else noData">
    <div *ngFor="let payment of paginatedPayments; trackBy: trackByPaymentId"
         class="grid grid-cols-8 gap-2 items-center px-4 py-3 border-b last:border-0 hover:bg-gray-50 rounded cursor-pointer transition"
         (click)="onPaymentSelect(payment)">
      
      <div class="font-medium text-gray-700">#{{ payment.id.substring(0, 8) }}</div>

      <div class="text-gray-600">{{ payment.invoiceDate | date:'MMM dd, yyyy' }}</div>

      <div class="text-gray-600">{{ payment.services.length }} service(s)</div>

      <div class="text-gray-800 font-medium">{{ payment.totalAmount | currency }}</div>

      <div class="text-gray-600">-{{ payment.discountAmount | currency }}</div>

      <div class="text-gray-900 font-semibold">{{ payment.finalAmount | currency }}</div>

      <div>
        <span class="px-2 py-1 rounded-full text-sm font-medium"
              [ngClass]="{
                'bg-green-100 text-green-700': payment.status.toLowerCase() === 'paid',
                'bg-red-100 text-red-700': payment.status.toLowerCase() === 'pending',
                'bg-yellow-100 text-yellow-700': payment.status.toLowerCase() === 'partial'
              }">
          {{ payment.status }}
        </span>
      </div>

      <div class="flex gap-2">
        <button *ngIf="payment.balance > 0"
                class="px-3 py-1.5 rounded-lg bg-orange-400 text-white text-sm hover:bg-orange-500 transition"
                (click)="onMakePayment(payment); $event.stopPropagation()">
          Pay
        </button>
        <button class="px-3 py-1.5 rounded-lg bg-gray-200 text-gray-700 text-sm hover:bg-gray-300 transition"
                (click)="onPaymentSelect(payment); $event.stopPropagation()">
          👁 View
        </button>
      </div>
    </div>
  </div>

  <ng-template #noData>
    <div class="text-center py-6 text-gray-500">
      No payment requests found for this patient.
    </div>
  </ng-template>

  <div class="flex flex-col md:flex-row justify-between items-center gap-3 mt-4" *ngIf="paginatedPayments.length">
    <div class="text-gray-600 text-sm dark-mode-text">
      Showing {{ getStartIndex() }} to {{ getEndIndex() }} of {{ filteredPaymentRequests.length }} entries
    </div>

    <div class="flex items-center gap-2">
      <button class="px-3 py-1.5 rounded-lg border bg-white text-gray-600 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed"
              [disabled]="currentPage === 1"
              (click)="goToPage(currentPage - 1)">
        ⬅ Prev
      </button>

      <div class="flex gap-1">
        <button *ngFor="let page of getPageNumbers()"
                class="px-3 py-1.5 rounded-lg border text-sm"
                [class.bg-blue-500]="page === currentPage"
                [class.text-white]="page === currentPage"
                [class.text-gray-700]="page !== currentPage"
                [class.bg-white]="page !== currentPage"
                (click)="goToPage(page)">
          {{ page }}
        </button>
      </div>

      <button class="px-3 py-1.5 rounded-lg border bg-white text-gray-600 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed"
              [disabled]="currentPage === totalPages"
              (click)="goToPage(currentPage + 1)">
        Next ➡
      </button>
    </div>

    <div class="flex items-center gap-2">
      <label class="text-sm text-gray-600">Items per page:</label>
      <select [(ngModel)]="itemsPerPage" (change)="onItemsPerPageChange()"
              class="px-2 py-1 border rounded-lg text-sm">
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="50">50</option>
      </select>
    </div>
  </div>
</div>
