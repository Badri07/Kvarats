<div class="bg-white rounded-lg shadow-sm">
  <!-- Search Bar -->
  <div class="p-4 border-b border-gray-200">
    <div class="flex flex-col sm:flex-row gap-3">
      <div class="flex-1">
        <input
          type="text"
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearchChange($event)"
          placeholder="Search patients by name..."
          class="w-full px-4 py-2 border border-gray-300 rounded-md
                 focus:outline-none focus:ring-2 focus:ring-orange-400">
      </div>

      <div class="flex gap-2">
        <!-- Clear Button -->
        <button
          (click)="clearSearch()"
          [disabled]="loading || !searchTerm"
          class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md
                 hover:bg-gray-400 disabled:bg-gray-200
                 disabled:text-gray-400 transition-colors">
          Clear
        </button>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div *ngIf="error" class="p-4 bg-red-50 text-red-700 text-sm">
    {{ error }}
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="p-8 text-center text-gray-500">
    Loading patients...
  </div>

  <!-- AG Grid Table -->
  <div *ngIf="!loading" class="overflow-x-auto mt-4">
    <ag-grid-angular
      class="ag-theme-alpine"
      [rowData]="patients"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [pagination]="true"
      [paginationPageSize]="pageSize"
      [paginationPageSizeSelector]="[10, 20, 50, 100]"
      (gridReady)="onGridReady($event)"
      style="width: 100%; height: 400px;">
    </ag-grid-angular>
  </div>

  <!-- Pagination -->
  <div *ngIf="!loading && totalPages > 1" class="px-6 py-4 border-t border-gray-200">
    <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
      <div class="text-sm text-gray-700">
        Showing
        {{ ((pageNumber - 1) * pageSize) + 1 }}
        to
        {{ Math.min(pageNumber * pageSize, totalCount) }}
        of
        {{ totalCount }} patients
      </div>

      <div class="flex items-center gap-2">
        <button
          (click)="previousPage()"
          [disabled]="pageNumber === 1"
          class="px-3 py-1 border border-gray-300 rounded-md
                 hover:bg-gray-50 disabled:opacity-50
                 disabled:cursor-not-allowed text-sm">
          Previous
        </button>

        <div class="flex gap-1">
          <button
            *ngFor="let page of getPageNumbers()"
            (click)="goToPage(page)"
            [class.bg-orange-400]="pageNumber === page"
            [class.text-white]="pageNumber === page"
            [class.border-orange-400]="pageNumber === page"
            [class.border-gray-300]="pageNumber !== page"
            [class.hover:bg-gray-50]="pageNumber !== page"
            class="px-3 py-1 border rounded-md text-sm transition-colors">
            {{ page }}
          </button>
        </div>

        <button
          (click)="nextPage()"
          [disabled]="pageNumber === totalPages"
          class="px-3 py-1 border border-gray-300 rounded-md
                 hover:bg-gray-50 disabled:opacity-50
                 disabled:cursor-not-allowed text-sm">
          Next
        </button>
      </div>
    </div>
  </div>
</div>
