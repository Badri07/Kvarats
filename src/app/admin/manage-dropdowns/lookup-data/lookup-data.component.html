 <div class="space-y-8">
      <!-- Header -->
     

  

      <!-- Quick Actions -->
      <div class="">
        <!-- <h2 class="text-lg font-semibold text-gray-900 mb-4">Quick Actions</h2> -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <button (click)="navigateToCategories()" class="flex items-center p-4 border border-gray-200 rounded-lg hover:border-primary-300 hover:bg-primary-50 transition-colors bg-white">
            <div class="flex-shrink-0 w-10 h-10 bg-primary-100 rounded-lg flex items-center justify-center mr-4">
              <svg class="w-6 h-6 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
              </svg>
            </div>
            <div class="text-left">
              <h3 class="font-medium text-gray-900">Manage Categories</h3>
              <p class="text-gray-500 text-sm">Create, edit, and delete categories</p>
            </div>
          </button>

          <button (click)="navigateToValues()" class="flex items-center p-4 border border-gray-200 rounded-lg hover:border-primary-300 hover:bg-primary-50 transition-colors bg-white">
            <div class="flex-shrink-0 w-10 h-10 bg-primary-100 rounded-lg flex items-center justify-center mr-4">
              <svg class="w-6 h-6 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
              </svg>
            </div>
            <div class="text-left">
              <h3 class="font-medium text-gray-900">Manage Values</h3>
              <p class="text-gray-500 text-sm">Add, edit, and reorder dropdown values</p>
            </div>
          </button>
        </div>
      </div>

      <!-- Categories Overview -->
      <div class="">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-lg font-semibold text-gray-900">Categories Overview</h2>
          <button (click)="navigateToCategories()" class="text-primary-500 hover:text-primary-600 font-medium text-sm">
            View All →
          </button>
        </div>

        <div class="space-y-4">
          <div
            *ngFor="let category of categories"
            class="flex items-center justify-between p-4 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors bg-white"
          >
            <div>
              <h3 class="font-medium text-gray-900">{{ category.category }}</h3>
              <p class="text-gray-500 text-sm" *ngIf="category.description">{{ category.description }}</p>
              <div class="text-xs text-gray-400 mt-1">
                Created {{ category.lastUpdated | date:'medium' }}
              </div>
            </div>
            <div class="flex items-center space-x-6">
              <div class="text-right">
                <div class="text-2xl font-semibold text-gray-900">{{ category.valueCount }}</div>
                <div class="text-xs text-gray-500">values</div>
              </div>
              <button
                (click)="manageCategory(category)"
                class="text-primary-500 hover:text-primary-600 transition-colors"
                title="Manage Values"
              >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m9 5 7 7-7 7"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div *ngIf="categories.length === 0" class="text-center py-8">
          <svg class="w-12 h-12 text-gray-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
          </svg>
          <h3 class="text-lg font-medium text-gray-900 mb-2">No Categories Yet</h3>
          <p class="text-gray-600 mb-4">Create your first dropdown category to get started.</p>
          <button (click)="navigateToCategories()" class="custom-button">
            Create Category
          </button>
        </div>
      </div>
    </div>
