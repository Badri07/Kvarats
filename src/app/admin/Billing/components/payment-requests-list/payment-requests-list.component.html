<div class="container mx-auto px-4 py-8">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-gray-800">Payment Requests</h1>
    <div class="flex items-center gap-4">
      <button (click)="onExportClick()" class="custom-button bg-orange-400 hover:bg-orange-500 text-white">
        Export to Excel
      </button>
      <button routerLink="/billing/payment-requests/new" class="custom-button bg-orange-400 hover:bg-orange-500 text-white">
        New Payment Request
      </button>
    </div>
  </div>

  <div class="card mb-6 p-6">
    <h2 class="text-lg font-semibold text-gray-700 mb-4">Filters</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
        <select 
          class="form-select" 
          [(ngModel)]="filterStatus" 
          (change)="applyFilters()"
        >
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="paid">Paid</option>
          <option value="partially_paid">Partially Paid</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Patient Name</label>
        <input
          type="text"
          [(ngModel)]="filterPatientName"
          (input)="applyFilters()"
          placeholder="Search by patient name"
          class="form-control"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Date From</label>
        <input
          type="date"
          [(ngModel)]="filterDateFrom"
          (change)="applyFilters()"
          class="form-control"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Date To</label>
        <input
          type="date"
          [(ngModel)]="filterDateTo"
          (change)="applyFilters()"
          class="form-control"
        />
      </div>
    </div>

    <div class="mt-4 flex justify-end gap-4">
      <button (click)="clearFilters()" class="btn-secondary">
        Clear Filters
      </button>
      <!-- <button (click)="applyFilters()" class="btn-primary">
        Apply Filters
      </button> -->
    </div>
  </div>

  <!-- AG Grid Table -->
  <div class="card overflow-hidden">
    <div *ngIf="loading" class="card py-12 flex flex-col items-center justify-center">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-orange-400"></div>
      <p class="mt-4 text-gray-600">Loading payment requests...</p>
    </div>

    <div *ngIf="error && !loading" class="card bg-red-50 border border-red-200 p-4">
      <p class="text-red-700">{{ error }}</p>
      <button (click)="loadPaymentRequests()" class="mt-4 btn-primary">
        Retry
      </button>
    </div>

    <ag-grid-angular
      *ngIf="!loading && !error"
      class="ag-theme-alpine w-full"
      style="height: 600px;"
      [rowData]="rowData"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [gridOptions]="gridOptions"
      [pagination]="true"
      [paginationPageSize]="paginationPageSize"
      [paginationPageSizeSelector]="paginationPageSizeSelector"
      [suppressRowClickSelection]="true"
      [rowSelection]="'multiple'"
      [animateRows]="true"
      [domLayout]="'normal'"
      (gridReady)="onGridReady($event)"
      (modelUpdated)="onModelUpdated()"
    >
    </ag-grid-angular>
  </div>

  <!-- Delete Confirmation Modal -->
  <div
    *ngIf="showDeleteModal()"
    class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4"
    (click)="closeDeleteModal()"
  >
    <div
      class="bg-white rounded-lg shadow-xl max-w-md w-full mx-auto"
      (click)="$event.stopPropagation()"
    >
      <!-- Modal Header -->
      <div class="flex items-center justify-between p-6 border-b">
        <h3 class="text-lg font-semibold text-gray-900">Delete Payment Request</h3>
        <button
          (click)="closeDeleteModal()"
          class="text-gray-400 hover:text-gray-600 text-xl font-bold transition-colors"
          [disabled]="isDeleting()"
        >
          ×
        </button>
      </div>

      <!-- Modal Content -->
      <div class="p-6">
        <div class="delete-confirmation text-center">
          <div class="warning-icon flex justify-center mb-4">
            <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
            </svg>
          </div>
          
          <h3 class="warning-title text-xl font-semibold text-gray-900 mb-2">Are you sure?</h3>
          
          <!-- <div *ngIf="paymentToDelete()" class="payment-details bg-gray-50 rounded-lg p-4 mb-4 text-left">
            <div class="space-y-2">
              <p class="text-sm text-gray-600">
                <span class="font-medium">Patient:</span> {{ paymentToDelete().patientName || 'N/A' }}
              </p>
              <p class="text-sm text-gray-600">
                <span class="font-medium">Invoice Date:</span> {{ formatDeleteDate(paymentToDelete().invoiceDate) }}
              </p>
              <p class="text-sm text-gray-600" *ngIf="paymentToDelete().invoiceNumber">
                <span class="font-medium">Invoice #:</span> {{ paymentToDelete().invoiceNumber }}
              </p>
              <p class="text-sm text-gray-600">
                <span class="font-medium">Total Amount:</span> {{ formatDeleteCurrency(paymentToDelete().finalAmount) }}
              </p>
              <p class="text-sm text-gray-600">
                <span class="font-medium">Status:</span> 
                <span [ngClass]="{
                  'text-green-600': paymentToDelete().status === 'paid',
                  'text-yellow-600': paymentToDelete().status === 'pending',
                  'text-red-600': paymentToDelete().status === 'overdue',
                  'text-blue-600': paymentToDelete().status === 'partially_paid'
                }" class="font-medium ml-1">
                  {{ capitalizeFirstLetter(paymentToDelete().status) }}
                </span>
              </p>
            </div>
          </div> -->
          
          <p class="warning-message text-gray-600 mb-6">
            This will permanently delete the payment request. All associated transaction records will be removed. 
            This action cannot be undone.
          </p>

          <!-- Error Message -->
          <div *ngIf="deleteError()" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-md">
            <p class="text-red-700 text-sm">{{ deleteError() }}</p>
          </div>

          <div class="confirmation-actions flex justify-center space-x-3">
            <button
              type="button"
              class="px-6 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-100 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed"
              (click)="closeDeleteModal()"
              [disabled]="isDeleting()"
            >
              Cancel
            </button>
            
            <button
              type="button"
              class="px-6 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed flex items-center"
              (click)="confirmDelete()"
              [disabled]="isDeleting()"
            >
              <span *ngIf="isDeleting()" class="inline-block animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"></span>
              {{ isDeleting() ? 'Deleting...' : 'Delete ' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
