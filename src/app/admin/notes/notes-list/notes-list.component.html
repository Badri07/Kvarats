<div class="min-h-screen">
  <div class="mx-auto">
    <div class="mb-3" *ngIf="selectedPatientId">
      <h1 class="dashboard-title">Therapy Notes & EHR</h1>
      <p class="dashboard-subtitle">Manage SOAP notes, progress notes, and treatment plans</p>
    </div>

    <!-- Show tabs only when a patient is selected -->
    <div *ngIf="selectedPatientId" class="mb-3">
      <!-- Fixed Animated Tabs -->
      <div class="animated-tabs mb-0">
        <div class="slider" 
             [style.left]="sliderLeft" 
             [style.width]="sliderWidth">
        </div>
        
        <div class="tab" 
             [class.active]="activeTab === 'soap'" 
             (click)="setActiveTab('soap', 0)">
          <i class="fas fa-file-medical mt-[3px]"></i>
          <span>SOAP Notes</span>
        </div>
        
        <div class="tab" 
             [class.active]="activeTab === 'dap'" 
             (click)="setActiveTab('dap', 1)">
          <i class="fas fa-file-alt mt-[3px]"></i>
          <span>DAP Notes</span>
        </div>
        
        <div class="tab" 
             [class.active]="activeTab === 'assessment'" 
             (click)="setActiveTab('assessment', 2)">
          <i class="fas fa-clipboard-list mt-[3px]"></i>
          <span>Initial Assessment</span>
        </div>

        <!-- Additional Tabs -->
        <div class="tab" 
             [class.active]="activeTab === 'crisis'" 
             (click)="setActiveTab('crisis', 3)">
          <i class="fas fa-exclamation-triangle mt-[3px]"></i>
          <span>Crisis Notes</span>
        </div>
        
        <div class="tab" 
             [class.active]="activeTab === 'treatment'" 
             (click)="setActiveTab('treatment', 4)">
          <i class="fas fa-map-marked-alt mt-[3px]"></i>
          <span>Treatment Plans</span>
        </div>
        
        <div class="tab" 
             [class.active]="activeTab === 'progress'" 
             (click)="setActiveTab('progress', 5)">
          <i class="fas fa-chart-line mt-[3px]"></i>
          <span>Progress Notes</span>
        </div>
        
        <div class="tab" 
             [class.active]="activeTab === 'discharge'" 
             (click)="setActiveTab('discharge', 6)">
          <i class="fas fa-sign-out-alt mt-[3px]"></i>
          <span>Discharge Summary</span>
        </div>
      </div>
    </div>

    <div class="space-y-6">
      <!-- Show patient list when no patient is selected -->
      <div *ngIf="!selectedPatientId">
        <div class="mb-4">
          <h2 class="text-xl font-semibold text-gray-900">Select a Patient</h2>
          <p class="text-gray-600">Choose a patient to view or create notes</p>
        </div>
        
        
        <app-patient-list
          (patientSelected)="onPatientSelected($event)">
        </app-patient-list>
      </div>

      <!-- Show note components when patient is selected -->
      <div *ngIf="selectedPatientId">
        <!-- Back button and patient info header -->
        <div class="bg-white rounded-lg shadow-sm px-4 py-2 mb-3">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <!-- <button
                (click)="goBackToPatients()"
                class="btn-secondary flex items-center gap-2">
                <span>←</span> Back to Patients
              </button> -->
              <!-- <div class="h-6 w-px bg-gray-300"></div> -->
              <div>
                <h2 class="text-lg font-semibold text-gray-900">
                  {{ selectedPatientName || 'Patient' }}
                </h2>
                <p class="text-sm text-gray-600">{{ getTabTitle() }}</p>
              </div>
            </div>
            <div>
              <button
                (click)="clearPatientSelection()"
                class="text-sm text-gray-600 hover:text-gray-900 flex items-center gap-1">
                <i class="fas fa-times"></i>
                Change Patient
              </button>
            </div>
          </div>
        </div>
        
        <!-- Note Components -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
          <app-soap-notes
            *ngIf="activeTab === 'soap'"
            [patientId]="selectedPatientId">
          </app-soap-notes>
          
          <app-dap-notes
            *ngIf="activeTab === 'dap'"
            [patientId]="selectedPatientId">
          </app-dap-notes>
          
          <app-initial-assessment
            *ngIf="activeTab === 'assessment'"
            [patientId]="selectedPatientId">
          </app-initial-assessment>
          
          <app-crisis-notes
            *ngIf="activeTab === 'crisis'"
            [patientId]="selectedPatientId">
          </app-crisis-notes>
          
          <app-treatment-plans
            *ngIf="activeTab === 'treatment'"
            [patientId]="selectedPatientId">
          </app-treatment-plans>
          
          <app-progress-notes
            *ngIf="activeTab === 'progress'"
            [patientId]="selectedPatientId">
          </app-progress-notes>
          
          <app-discharge-summary
            *ngIf="activeTab === 'discharge'"
            [patientId]="selectedPatientId">
          </app-discharge-summary>
        </div>
      </div>
    </div>
  </div>
</div>
