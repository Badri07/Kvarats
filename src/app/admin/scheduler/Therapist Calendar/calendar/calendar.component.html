<div class="flex flex-col h-screen bg-gray-50">
  <app-calendar-header
    [currentDate]="currentDate"
    [view]="view"
    (dateChange)="currentDate = $event"
    (viewChange)="view = $event"
    (todayClick)="handleTodayClick()"
  ></app-calendar-header>

  <div class="flex-1 flex overflow-hidden">
    <div class="flex-1 overflow-hidden relative">
      <div *ngIf="loading" class="flex items-center justify-center h-full">
        <div class="text-gray-500">Loading appointments...</div>
      </div>

      <ng-container *ngIf="!loading">
        <app-day-view
          *ngIf="view === 'day'"
          [currentDate]="currentDate"
          [events]="calendarEvents"
          [startHour]="0"
          [endHour]="24"
          (eventClick)="handleEventClick($event)"
          (timeSlotClick)="handleTimeSlotClick($event)"
        ></app-day-view>

        <app-week-view
          *ngIf="view === 'week'"
          [currentDate]="currentDate"
          [events]="calendarEvents"
          [startHour]="0"
          [endHour]="24"
          (eventClick)="handleEventClick($event)"
          (timeSlotClick)="handleTimeSlotClick($event)"
        ></app-week-view>

        <div *ngIf="view === 'month'" class="flex items-center justify-center h-full">
          <div class="text-gray-500">Month view coming soon...</div>
        </div>
      </ng-container>

      <button
        (click)="handleNewAppointment()"
        class="fixed bottom-8 right-8 bg-orange-400 text-white rounded-full p-4 shadow-lg hover:bg-orange-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transition-all hover:scale-110"
        aria-label="New appointment"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
      </button>
    </div>

    <app-appointment-sidebar
      *ngIf="selectedAppointment"
      [appointment]="selectedAppointment"
      (close)="handleCloseSidebar()"
      (edit)="handleEditFromSidebar($event)"
      (delete)="handleDeleteAppointment($event)"
    ></app-appointment-sidebar>
  </div>

  <app-appointment-modal
    [isOpen]="isModalOpen"
    [appointment]="editingAppointment"
    [initialDate]="initialDate"
    [initialHour]="initialHour"
    [patients]="patients"
    [services]="services"
    (closeModal)="handleCloseModal()"
    (save)="handleSaveAppointment($event)"
    (patientChange)="handlePatientChange($event)"
  ></app-appointment-modal>
</div>
