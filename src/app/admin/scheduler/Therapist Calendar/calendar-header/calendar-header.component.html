<div class="bg-white border-b border-gray-200 px-6 py-3">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-4">
      <button
        (click)="onTodayClick()"
        class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transition-colors"
      >
        Today
      </button>

      <div class="flex items-center gap-2">
        <button
          (click)="navigateDate('prev')"
          class="p-2 text-gray-600 hover:bg-gray-100 rounded-md transition-colors"
          aria-label="Previous"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
        </button>
        <button
          (click)="navigateDate('next')"
          class="p-2 text-gray-600 hover:bg-gray-100 rounded-md transition-colors"
          aria-label="Next"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        </button>
      </div>

      <div class="flex items-center gap-2 text-gray-900">
        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <h2 class="text-lg font-semibold">{{ getFormattedDate() }}</h2>
      </div>
    </div>

    <div class="flex items-center gap-1 bg-gray-100 rounded-lg p-1">
      <button
        *ngFor="let v of views"
        (click)="onViewChange(v)"
        [class]="'px-4 py-2 text-sm font-medium rounded-md transition-colors ' + (view === v ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-600 hover:text-gray-900')"
      >
        {{ v.charAt(0).toUpperCase() + v.slice(1) }}
      </button>
    </div>
  </div>
</div>
