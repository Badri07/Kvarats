<div
  (click)="onClick($event)"
  class="mx-1 px-2 py-1 rounded text-xs text-white cursor-pointer hover:opacity-90 transition-opacity overflow-hidden"
  [style.background-color]="'#3b82f6'">

  <div class="font-semibold truncate">{{ event.patientName }}</div>
  <div class="text-xs opacity-90 truncate">{{ getTimeRange() }}</div>
  <div class="text-xs opacity-90 truncate">{{ event.therapistName }}</div>
  
</div>
